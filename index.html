<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PsychoProfile — Know Thyself</title>
  <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #03040a;
      --surface: rgba(8,6,18,0.72);
      --surface2: rgba(12,8,24,0.65);
      --accent: #00ffe5;
      --accent2: #ff5500;
      --accent3: #c060ff;
      --accent4: #ff9900;
      --text: #e8f0ff;
      --muted: #6a7a9a;
      --border: rgba(100,60,200,0.2);
      --radius: 4px;
      --font-head: 'Bebas Neue', sans-serif;
      --font-display: 'Creepster', cursive;
      --font-body: 'Space Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ── Psychedelic images background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url('/static/images/psycho.jpg');
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      filter: saturate(1.2) brightness(0.35) blur(1px);
      transform: scale(1.04);
      z-index: 0;
      pointer-events: none;
      animation: bgShift 14s ease-in-out infinite alternate;
    }

    @keyframes bgShift {
      0%   { filter: saturate(1.2) brightness(0.35) blur(1px); transform: scale(1.04); }
      100% { filter: saturate(1.5) brightness(0.40) blur(0.5px); transform: scale(1.07); }
    }

    /* ── Scanlines overlay ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 1;
    }

    * { position: relative; z-index: 2; }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      border-bottom: 1px solid rgba(192,96,255,0.25);
      position: sticky;
      top: 0;
      background: rgba(3,4,10,0.75);
      backdrop-filter: blur(20px);
      z-index: 200;
    }

    .logo {
      font-family: var(--font-display);
      font-size: 32px;
      letter-spacing: 2px;
      color: var(--text);
      text-shadow: 0 0 20px rgba(0,255,229,0.5), 0 0 40px rgba(192,96,255,0.3);
    }
    .logo span { color: var(--accent2); text-shadow: 0 0 20px rgba(255,85,0,0.7); }

    nav { display: flex; gap: 8px; align-items: center; }

    nav button {
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 700;
      background: transparent;
      border: 1px solid rgba(192,96,255,0.3);
      color: var(--muted);
      padding: 8px 18px;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    nav button:hover {
      border-color: var(--accent3);
      color: var(--accent3);
      box-shadow: 0 0 12px rgba(192,96,255,0.3), inset 0 0 12px rgba(192,96,255,0.07);
    }
    nav button.active {
      border-color: var(--accent2);
      color: var(--accent2);
      box-shadow: 0 0 16px rgba(255,85,0,0.3), inset 0 0 16px rgba(255,85,0,0.08);
    }

    /* ── Hamburger ── */
    .hamburger {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      width: 36px;
      height: 36px;
      background: transparent;
      border: 1px solid rgba(192,96,255,0.3);
      border-radius: 2px;
      cursor: pointer;
      padding: 6px 7px;
      transition: border-color 0.2s, box-shadow 0.2s;
      z-index: 300;
    }
    .hamburger span {
      display: block;
      width: 100%;
      height: 1.5px;
      background: var(--muted);
      border-radius: 1px;
      transition: all 0.3s ease;
      transform-origin: center;
    }
    .hamburger:hover {
      border-color: var(--accent3);
      box-shadow: 0 0 12px rgba(192,96,255,0.3);
    }
    .hamburger:hover span { background: var(--accent3); }
    .hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

    /* ── Mobile nav dropdown ── */
    @media (max-width: 768px) {
      header { padding: 16px 20px; }

      .logo { font-size: 26px; }

      .hamburger { display: flex; }

      nav {
        display: none;
        position: absolute;
        top: calc(100% + 1px);
        right: 0;
        left: 0;
        flex-direction: column;
        gap: 0;
        background: rgba(3,4,10,0.97);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(192,96,255,0.25);
        padding: 12px 20px 16px;
        z-index: 299;
      }
      nav.open { display: flex; }

      nav button {
        width: 100%;
        text-align: left;
        padding: 12px 16px;
        border-color: rgba(192,96,255,0.15);
        font-size: 12px;
        border-radius: 2px;
      }
      nav button + button { margin-top: 6px; }
    }

    /* ── Hero ── */
    .hero {
      text-align: center;
      padding: 10px 24px 10px;
      overflow: hidden;
    }

    .hero-eyebrow {
      font-family: var(--font-body);
      font-size: 11px;
      letter-spacing: 4px;
      color: var(--accent3);
      text-transform: uppercase;
      margin-bottom: 20px;
      opacity: 0.8;
    }

    .hero h1 {
      font-family: var(--font-display);
      font-size: clamp(48px, 10vw, 110px);
      font-weight: 400;
      line-height: 0.9;
      letter-spacing: 4px;
      margin-bottom: 12px;
      color: var(--text);
      text-shadow:
        0 0 30px rgba(0,255,229,0.3),
        0 0 80px rgba(0,255,229,0.1);
    }
    .hero h1 .crack {
      display: block;
      color: var(--accent2);
      text-shadow:
        0 0 20px rgba(255,45,120,0.5),
        0 0 60px rgba(255,45,120,0.2),
        2px 2px 0 rgba(184,79,255,0.4);
      animation: flicker 6s infinite;
    }

    @keyframes flicker {
      0%, 90%, 100% { opacity: 1; }
      91% { opacity: 0.4; }
      92% { opacity: 1; }
      94% { opacity: 0.2; }
      95% { opacity: 1; }
    }

    .hero p {
      color: var(--muted);
      font-size: 12px;
      max-width: 440px;
      margin: 20px auto 0;
      letter-spacing: 0.5px;
      line-height: 1.8;
    }

    /* Decorative orb behind hero */
    .hero-orb {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(192,96,255,0.12) 0%, rgba(255,85,0,0.06) 50%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      animation: pulse 5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-50%,-50%) scale(1.1)} }

    /* ── Main ── */
    main { max-width: 900px; margin: 0 auto; padding: 0 24px 80px; }

    /* ── Cards ── */
    .card {
      background: rgba(8,5,20,0.6);
      border: 1px solid rgba(192,96,255,0.15);
      border-top: 2px solid rgba(192,96,255,0.35);
      border-radius: var(--radius);
      padding: 32px;
      margin-bottom: 24px;
      animation: fadeUp 0.5s ease both;
      backdrop-filter: blur(12px);
      box-shadow: 0 4px 40px rgba(0,0,0,0.5);
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-title {
      font-family: var(--font-head);
      font-size: 12px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .card-title::before {
      content: '';
      display: inline-block;
      width: 18px;
      height: 2px;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }

    /* ── Form ── */
    .field { margin-bottom: 24px; }
    .field label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      color: var(--accent3);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .field input[type="text"],
    .field select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-bottom: 1px solid rgba(0,255,229,0.2);
      border-radius: 2px;
      padding: 12px 16px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 13px;
      outline: none;
      transition: all 0.2s;
    }
    .field input[type="text"]:focus,
    .field select:focus {
      border-color: rgba(0,255,229,0.4);
      box-shadow: 0 0 16px rgba(0,255,229,0.08);
    }
    .field select option { background: #0d0d14; }

    /* ── Pet pills ── */
    .pet-options { display: flex; gap: 12px; flex-wrap: wrap; }
    .pet-toggle { display: none; }
    .pet-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 10px 20px;
      border-radius: 2px;
      cursor: pointer;
      font-size: 12px;
      font-family: var(--font-body);
      color: var(--muted);
      transition: all 0.2s;
      letter-spacing: 1px;
    }
    .pet-pill:hover {
      border-color: rgba(184,79,255,0.4);
      color: var(--accent3);
    }
    .pet-toggle:checked + .pet-pill {
      background: rgba(184,79,255,0.12);
      border-color: var(--accent3);
      color: var(--accent3);
      box-shadow: 0 0 12px rgba(184,79,255,0.15);
    }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: transparent;
      color: var(--accent);
      font-family: var(--font-head);
      font-size: 18px;
      font-weight: 400;
      letter-spacing: 4px;
      border: 1px solid rgba(0,255,229,0.4);
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
      text-transform: uppercase;
      box-shadow: 0 0 20px rgba(0,255,229,0.05), inset 0 0 20px rgba(0,255,229,0.02);
    }
    .btn-submit:hover {
      background: rgba(0,255,229,0.07);
      box-shadow: 0 0 30px rgba(0,255,229,0.15), inset 0 0 20px rgba(0,255,229,0.05);
    }

    /* ── Input table ── */
    .input-table { width: 100%; border-collapse: collapse; }
    .input-table td {
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }
    .input-table td:first-child { color: var(--muted); width: 140px; text-transform: uppercase; letter-spacing: 1px; font-size: 10px; }
    .input-table td:last-child { color: var(--accent); font-weight: 700; }

    /* ── Profile ── */
    .profile-header {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }
    @media (max-width: 600px) { .profile-header { grid-template-columns: 1fr; } }

    .profile-block {
      background: rgba(10,6,24,0.6);
      border: 1px solid rgba(192,96,255,0.15);
      border-left: 2px solid var(--accent3);
      border-radius: 2px;
      padding: 24px;
      backdrop-filter: blur(8px);
    }
    .profile-block .label {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .profile-block .value {
      font-family: var(--font-head);
      font-size: 26px;
      letter-spacing: 2px;
      color: var(--accent);
      line-height: 1.1;
      margin-bottom: 8px;
      text-shadow: 0 0 20px rgba(0,255,229,0.3);
    }
    .profile-block .desc {
      font-size: 11px;
      color: var(--muted);
      font-style: italic;
      line-height: 1.6;
    }

    /* ── Movies ── */
    .movies-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }
    .movie-card {
      background: rgba(10,6,24,0.6);
      border: 1px solid rgba(192,96,255,0.12);
      border-radius: 2px;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s;
      backdrop-filter: blur(8px);
    }
    .movie-card:hover {
      transform: translateY(-4px);
      border-color: rgba(255,85,0,0.4);
      box-shadow: 0 8px 32px rgba(255,85,0,0.15);
    }
    .movie-card img {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      display: block;
      filter: saturate(1.3) contrast(1.1);
    }
    .movie-info { padding: 14px; }
    .movie-title { font-family: var(--font-head); font-size: 16px; letter-spacing: 1px; margin-bottom: 4px; }
    .movie-year  { font-size: 11px; color: var(--muted); margin-bottom: 8px; letter-spacing: 1px; }
    .movie-rating {
      display: inline-block;
      background: transparent;
      border: 1px solid rgba(255,184,0,0.4);
      color: var(--accent4);
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 2px;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }
    .movie-plot { font-size: 11px; color: var(--muted); line-height: 1.6; }

    /* ── Pets ── */
    .pets-grid { display: flex; gap: 16px; flex-wrap: wrap; }
    .pet-card {
      flex: 1;
      min-width: 180px;
      background: rgba(10,6,24,0.6);
      border: 1px solid rgba(192,96,255,0.12);
      border-radius: 2px;
      overflow: hidden;
      backdrop-filter: blur(8px);
    }
    .pet-card img { width: 100%; height: 200px; object-fit: cover; display: block; filter: saturate(1.2); }
    .pet-card .pet-label { padding: 10px 14px; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent3); }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: rgba(0,255,229,0.1);
      border: 1px solid rgba(0,255,229,0.3);
      color: var(--accent);
      font-size: 12px;
      letter-spacing: 1px;
      padding: 12px 22px;
      border-radius: 2px;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      transform: translateY(12px);
      z-index: 9999;
      pointer-events: none;
      font-family: var(--font-body);
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.error { background: rgba(255,45,120,0.1); border-color: rgba(255,45,120,0.4); color: var(--accent2); }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 1px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
      box-shadow: 0 0 8px rgba(0,255,229,0.3);
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Empty ── */
    .empty {
      text-align: center;
      padding: 80px 24px;
      color: var(--muted);
    }
    .empty p { font-size: 13px; letter-spacing: 0.5px; }
    .empty strong { color: var(--accent); }

    /* ── Glitch divider ── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 24px 0;
      position: relative;
    }

    /* ── Section tint overlays ── */
    .bg-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.8s ease;
    }
    .bg-ghost {
      background: radial-gradient(ellipse 70% 70% at 50% 40%, rgba(0,255,229,0.07) 0%, transparent 70%);
    }
    .bg-psycho {
      background: radial-gradient(ellipse 70% 70% at 50% 50%, rgba(255,85,0,0.08) 0%, rgba(192,96,255,0.06) 60%, transparent 80%);
    }
    .bg-ghost.active  { opacity: 1; }
    .bg-psycho.active { opacity: 1; }

    /* ── White hacking scanner overlay ── */
    #wave-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

  </style>
</head>
<body>


<div class="bg-layer bg-ghost" id="bg-ghost"></div>
<div class="bg-layer bg-psycho" id="bg-psycho"></div>
<div id="wave-overlay"></div>
<header>
  <div class="logo">Psycho<span>Profile</span></div>
  <button class="hamburger" id="hamburger" aria-label="Toggle menu" onclick="toggleNav()">
    <span></span><span></span><span></span>
  </button>
  <nav id="main-nav">
    <button id="btn-form"    onclick="loadForm(); closeNav()">Fill Form</button>
    <button id="btn-input"   onclick="viewInput(); closeNav()">View Input</button>
    <button id="btn-profile" onclick="viewProfile(); closeNav()">Profile</button>
  </nav>
</header>


<main id="content">
  <div id="home-hero">
    <div class="hero-orb"></div>

    <!-- Main heading -->
    <h1 class="hero-title">
      KNOW<br>
      <span class="crack">THYSELF</span>
    </h1>

    <!-- Sub -->
    <p class="hero-sub">
      A dark mirror built from science &amp; shadow.<br>
      Answer. Submit. Confront what stares back.
    </p>

    <!-- CTA -->
    <button class="hero-cta" onclick="loadForm()">
      <span class="hero-cta-inner">
        ⬡ &nbsp;Begin Profiling&nbsp; ⬡
      </span>
    </button>

    <!-- Stats row -->
    <div class="hero-stats">
      <div class="hero-stat">
        <span class="hero-stat-val">7</span>
        <span class="hero-stat-lbl">Dimensions</span>
      </div>
      <div class="hero-stat-divider"></div>
      <div class="hero-stat">
        <span class="hero-stat-val">20</span>
        <span class="hero-stat-lbl">Questions</span>
      </div>
      <div class="hero-stat-divider"></div>
      <div class="hero-stat">
        <span class="hero-stat-val">∞</span>
        <span class="hero-stat-lbl">Revelations</span>
      </div>
    </div>

    <!-- Feature pills -->
    <div class="hero-pills">
      <span class="hero-pill">🧠 Big Five Traits</span>
      <span class="hero-pill">🎴 Archetype Name</span>
      <span class="hero-pill">⚡ Superpower &amp; Kryptonite</span>
      <span class="hero-pill">🎭 Fictional Twin</span>
      <span class="hero-pill">🌍 Soul City</span>
      <span class="hero-pill">💀 Villain Origin</span>
    </div>

    <!-- Scroll hint -->
    <div class="hero-scroll-hint">
      <span class="hero-scroll-line"></span>
      <span class="hero-scroll-text">scroll to descend</span>
      <span class="hero-scroll-line"></span>
    </div>
  </div>
</main>

<style>
  /* ── Hero Landing ─────────────────────────────────────────────── */
  #home-hero {
    min-height: calc(100vh - 70px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px 24px 40px;
    position: relative;
    overflow: hidden;
  }

  /* Reuse .hero-orb from existing CSS */
  #home-hero .hero-orb {
    width: 700px;
    height: 700px;
  }

  .hero-eyebrow {
    font-family: var(--font-body);
    font-size: 10px;
    letter-spacing: 5px;
    color: var(--accent3);
    text-transform: uppercase;
    margin-bottom: 28px;
    opacity: 0.75;
    animation: fadeSlideUp 0.8s ease both;
  }

  .hero-title {
    font-family: var(--font-display);
    font-size: clamp(72px, 16vw, 160px);
    font-weight: 400;
    line-height: 0.85;
    letter-spacing: 6px;
    margin-bottom: 28px;
    color: var(--text);
    text-shadow: 0 0 40px rgba(0,255,229,0.25), 0 0 100px rgba(0,255,229,0.08);
    animation: fadeSlideUp 0.9s 0.1s ease both;
  }

  .hero-title .crack {
    display: block;
    color: var(--accent2);
    text-shadow:
      0 0 20px rgba(255,45,120,0.55),
      0 0 70px rgba(255,45,120,0.2),
      3px 3px 0 rgba(184,79,255,0.45);
    animation: flicker 6s infinite, fadeSlideUp 0.9s 0.15s ease both;
  }

  .hero-sub {
    font-size: 13px;
    color: var(--muted);
    max-width: 380px;
    line-height: 1.9;
    letter-spacing: 0.5px;
    margin-bottom: 40px;
    animation: fadeSlideUp 1s 0.25s ease both;
  }

  /* CTA Button */
  .hero-cta {
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    background: transparent;
    border: none;
    cursor: pointer;
    margin-bottom: 52px;
    padding: 0;
    animation: fadeSlideUp 1s 0.35s ease both;
  }
  .hero-cta-inner {
    display: inline-block;
    padding: 14px 36px;
    border: 1px solid var(--accent2);
    color: var(--accent2);
    border-radius: 2px;
    box-shadow: 0 0 18px rgba(255,85,0,0.25), inset 0 0 18px rgba(255,85,0,0.05);
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }
  .hero-cta-inner::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,85,0,0.12), transparent);
    transform: translateX(-100%);
    transition: transform 0.5s ease;
  }
  .hero-cta:hover .hero-cta-inner {
    color: #fff;
    border-color: var(--accent2);
    box-shadow: 0 0 32px rgba(255,85,0,0.5), inset 0 0 28px rgba(255,85,0,0.12);
    transform: translateY(-2px);
  }
  .hero-cta:hover .hero-cta-inner::before { transform: translateX(100%); }

  /* Stats row */
  .hero-stats {
    display: flex;
    align-items: center;
    gap: 28px;
    margin-bottom: 40px;
    animation: fadeSlideUp 1s 0.45s ease both;
  }
  .hero-stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .hero-stat-val {
    font-family: var(--font-head);
    font-size: 32px;
    letter-spacing: 3px;
    color: var(--accent);
    text-shadow: 0 0 18px rgba(0,255,229,0.5);
    line-height: 1;
  }
  .hero-stat-lbl {
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .hero-stat-divider {
    width: 1px;
    height: 40px;
    background: linear-gradient(to bottom, transparent, rgba(192,96,255,0.4), transparent);
  }

  /* Feature pills */
  .hero-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    max-width: 560px;
    margin-bottom: 56px;
    animation: fadeSlideUp 1s 0.55s ease both;
  }
  .hero-pill {
    font-size: 10px;
    letter-spacing: 1px;
    color: rgba(200,215,255,0.65);
    border: 1px solid rgba(192,96,255,0.2);
    padding: 5px 14px;
    border-radius: 20px;
    background: rgba(192,96,255,0.05);
    backdrop-filter: blur(6px);
    transition: all 0.2s;
    cursor: default;
  }
  .hero-pill:hover {
    border-color: rgba(192,96,255,0.5);
    color: var(--accent3);
    background: rgba(192,96,255,0.1);
    box-shadow: 0 0 12px rgba(192,96,255,0.2);
  }

  /* Scroll hint */
  .hero-scroll-hint {
    display: flex;
    align-items: center;
    gap: 12px;
    opacity: 0.4;
    animation: fadeSlideUp 1s 0.7s ease both;
  }
  .hero-scroll-line {
    width: 40px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--muted));
  }
  .hero-scroll-line:last-child {
    background: linear-gradient(90deg, var(--muted), transparent);
  }
  .hero-scroll-text {
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* Entrance animation */
  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Mobile tweaks */
  @media (max-width: 600px) {
    .hero-title { letter-spacing: 3px; }
    .hero-stats { gap: 18px; }
    .hero-stat-val { font-size: 26px; }
    .hero-pills { gap: 8px; }
  }
</style>

<script>
function toggleNav() {
  const nav = document.getElementById("main-nav");
  const btn = document.getElementById("hamburger");
  nav.classList.toggle("open");
  btn.classList.toggle("open");
}
function closeNav() {
  document.getElementById("main-nav").classList.remove("open");
  document.getElementById("hamburger").classList.remove("open");
}
// Close nav when clicking outside
document.addEventListener("click", function(e) {
  const nav = document.getElementById("main-nav");
  const btn = document.getElementById("hamburger");
  if (!nav.contains(e.target) && !btn.contains(e.target)) closeNav();
});

function showBg(name) {
  document.getElementById("bg-ghost").classList.remove("active");
  document.getElementById("bg-psycho").classList.remove("active");
  if (name === "ghost")  document.getElementById("bg-ghost").classList.add("active");
  if (name === "psycho") document.getElementById("bg-psycho").classList.add("active");
}

// ── Glitch flicker lines ───────────────────────────────────────────────────
(function() {
  const overlay = document.getElementById("wave-overlay");

  function spawnGlitch() {
    const line = document.createElement("div");
    const top  = Math.random() * 100;
    const w    = 20 + Math.random() * 60;
    const left = Math.random() * (100 - w);
    const h    = Math.random() < 0.5 ? 1 : 2;
    const dur  = 80 + Math.random() * 180;
    line.style.cssText = `
      position:absolute;top:${top}%;left:${left}%;
      width:${w}%;height:${h}px;
      background:rgba(255,255,255,${0.15 + Math.random() * 0.45});
      box-shadow:0 0 6px 1px rgba(255,255,255,0.3);
      pointer-events:none;
    `;
    overlay.appendChild(line);
    setTimeout(() => line.remove(), dur);
  }

  function glitchBurst() {
    const count = 2 + Math.floor(Math.random() * 4);
    for (let i = 0; i < count; i++) setTimeout(spawnGlitch, i * 30);
    setTimeout(glitchBurst, 800 + Math.random() * 2700);
  }

  glitchBurst();
})();

</script>
